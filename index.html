<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simples</title>
 
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="text-bg-dark p-3">

    <main class="container d-flex justify-content-center align-items-center vh-100">

        <div>

            <h2 id="titulo">Login</h2>

            <form id="login-form" class="w-100 d-flex flex-column gap-2">

                <div class="conjunto" id="email-c">
                <label for="email">Email: </label>
                <input type="email" id="email" placeholder="Email" required class="form-control">
                </div>

                <div class="conjunto" id="senha-c">
                <label for="senha">Senha: </label>
                <input type="password" id="senha" placeholder="Senha" required class="form-control">
                </div>

                <button id="entrar" type="submit" class="btn btn-outline-light w-100 mt-3">Entrar</button>
            </form>

        <div id="mensagem"></div>

        <div class="toggle" id="toggle">

            <p>Não tem uma conta? Cadastre-se</p>

        </div>

    </main>

    <footer>



    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/script.js"></script>

</body>

</html>
